name: Update Leaderboard

on:
  pull_request:
    types: [closed]
    paths:
      - 'submissions/**'

jobs:
  update-leaderboard:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas scikit-learn

      - name: Fetch ground truth file
        run: |
          git clone https://x-access-token:${{ secrets.GT_ACCESS_TOKEN }}@github.com/siyaagarwal2005/competition-ground-truth.git gt_repo
          cp gt_repo/test_motion_data.csv data/test_motion_data.csv

      - name: Run leaderboard update
        run: |
          cd leaderboard
          python update_leaderboard.py

      - name: Commit and push leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard/leaderboard.json
          git commit -m "Auto-update leaderboard after PR merge" || echo "No changes to commit"
          git push
          